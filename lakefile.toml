name = "react-agent"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["react-agent"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0"

[[require]]
name = "curlLean"
git = "https://github.com/marcellop71/curl-lean"
rev = "main"

[[lean_lib]]
name = "ReActAgent"

[[lean_exe]]
name = "react-agent"
root = "Main"
